<!DOCTYPE html>
<html>
<head>
    <title>Smart Certificate System - Track</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 300px;
            margin: 5px;
        }

        button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            margin-top: 20px;
        }

        td, th {
            padding: 10px;
            border: 1px solid black;
        }
    </style>
</head>

<body>

<h2>Track Your Certificate Requests</h2>

<!-- Navigation -->
<a href="/">Home</a> |
<a href="/login">Admin Login</a>

<br><br>

<!-- Form -->
 <h2>Track Requests</h2>
<form method="post">
    <input type="email" name="email" placeholder="Enter your email" required>
    <br>
    <button type="submit">Track</button>
</form>

<!-- Data -->
{% if data %}

<table>
<tr>
<th>Message</th>
<th>Priority</th>
<th>Status</th>
<th>Reply</th>
</tr>

{% for r in data %}
<tr>
<td>{{ r[2] }}</td>

<td style="color:
{% if r[3].startswith('High') %}red
{% elif r[3].startswith('Medium') %}orange
{% else %}green
{% endif %}
">
{{ r[3] }}
</td>

<td style="color:
{% if r[4] == 'Resolved' %}green
{% else %}red
{% endif %}
">
{{ r[4] }}
</td>

<td>{{ r[5] }}</td>
</tr>
{% endfor %}

</table>

{% else %}
<p>No requests found</p>
{% endif %}

</body>
</html>
